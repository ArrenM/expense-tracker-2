<div class="container-fluid w-50 mt-5">
  <div class="card">
    <div class="card-body">
      <h4 class="card-title text-center">Add Expense</h4>
      <div class="mb-3">
        <label class="form-label" for="title">Expense Title</label>
        <input
          type="text"
          id="title"
          name="title"
          placeholder="Enter expense title"
          class="form-control"
          [(ngModel)]="title"
        />
      </div>
      <div class="mb-3">
        <label class="form-label" for="amount">Amount ($)</label>
        <input
          type="number"
          id="amount"
          name="amount"
          placeholder="0"
          class="form-control"
          [(ngModel)]="amount"
        />
      </div>
      <div class="mb-3">
        <label class="form-label" for="category">Category</label>
        <select class="form-select" [(ngModel)]="category">
          <option value="None" selected disabled>Select category</option>
          <option value="Work">Work</option>
          <option value="Personal">Personal</option>
          <option value="Grocery">Grocery</option>
          <option value="Utilities">Utilities</option>
          <option value="Shopping">Shopping</option>
          <option value="Travel">Travel</option>
          <option value="Food">Food</option>
        </select>
      </div>
      <div class="d-grid">
        <button class="btn btn-primary" (click)="add()">Add Expense</button>
      </div>
    </div>
  </div>
  <div
    class="text-center"
    [class.text-success]="success"
    [class.text-danger]="!success"
    id="message"
  >
    @if (success) {
      Expense added!
    } @else {
      Title and Category must be set.
    }
  </div>
</div>
