<div class="container-fluid w-50 mt-5">
  <div class="card">
    <div class="card-body">
      @if (expense) {
        <h4 class="card-title text-center">Edit Expense</h4>
        <div class="mb-3">
          <label class="form-label" for="title">Expense Title</label>
          <input
            type="text"
            id="title"
            name="title"
            placeholder="Enter expense title"
            class="form-control"
            [(ngModel)]="this.expense.title"
          />
        </div>
        <div class="mb-3">
          <label class="form-label" for="amount">Amount ($)</label>
          <input
            type="number"
            id="amount"
            name="amount"
            placeholder="0"
            class="form-control"
            [(ngModel)]="this.expense.amount"
          />
        </div>
        <div class="mb-3">
          <label class="form-label" for="category">Category</label>
          <select class="form-select" [(ngModel)]="this.expense.category">
            <option value="None" selected disabled>Select category</option>
            <option value="Work">Work</option>
            <option value="Personal">Personal</option>
            <option value="Grocery">Grocery</option>
            <option value="Utilities">Utilities</option>
            <option value="Shopping">Shopping</option>
            <option value="Travel">Travel</option>
            <option value="Food">Food</option>
          </select>
        </div>
        <div class="d-grid">
          <button class="btn btn-danger" (click)="delete()">Delete</button>
        </div>
      } @else {
        <h5 class="card-title">Error!</h5>
        <div class="card-body">
          <p>Could not find expense with id: {{ id() }}.</p>
        </div>
      }
    </div>
  </div>
</div>
