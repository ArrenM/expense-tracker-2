<div class="container-fluid">
  <h1>Dashboard</h1>
  <div class="row">
    <div class="card" style="width: 50%">
      <div class="card-body">
        <h5 class="card-title">Total Expenses</h5>
        <p class="card-text">${{ expenseService.totalExpense().toFixed(2) }}</p>
      </div>
    </div>
    <div class="card" style="width: 50%">
      <div class="card-body">
        <h5 class="card-title">Number of Expenses</h5>
        <p class="card-text">{{ expenseService.transactionCount() }}</p>
      </div>
    </div>
    <div class="card" style="width: 50%">
      <div class="card-body">
        <h5 class="card-title">Highest Expense</h5>
        <p class="card-text">${{ expenseService.highestExpense().toFixed(2) }}</p>
      </div>
    </div>
    <div class="card" style="width: 50%">
      <div class="card-body">
        <h5 class="card-title">Average Expense per Transaction</h5>
        <p class="card-text">${{ expenseService.averageExpense().toFixed(2) }}</p>
      </div>
    </div>
  </div>
</div>
