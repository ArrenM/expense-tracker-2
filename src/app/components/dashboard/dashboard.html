<div class="container-fluid">
  <h1>{{ user.username }}'s Dashboard</h1>
  <h2>Transactions</h2>

  <div class="card">
    <div class="card-body">
      <h3 class="card-title">Filters</h3>

      <div>
        <label for="category">Category:</label>
        <select id="category" [(ngModel)]="categoryFilter">
          @for (category of categoryService.userCategories(); track category.id) {
            <option [ngValue]="category.id">{{ category.name }}{{ category.icon }}</option>
          }
        </select>
      </div>

      <div>
        <label for="min">Minimum Amount:</label>
        <input type="number" id="min" [(ngModel)]="minAmount" />
        <label for="max">Maximum Amount:</label>
        <input type="number" id="max" [(ngModel)]="maxAmount" />
      </div>

      <div>
        <label for="start">Start Date:</label>
        <input type="date" id="start" [(ngModel)]="dateStart" />
        <label for="end">End Date:</label>
        <input type="date" id="end" [(ngModel)]="dateEnd" />
      </div>

      <button class="btn btn-primary" (click)="clearFilter()">Clear</button>
    </div>
  </div>

  <button class="btn btn-primary" [routerLink]="['transaction/add']">Add</button>
  @for (transaction of filteredTransactions(); track transaction.id) {
    <app-transaction-details [transaction]="transaction" />
  }
</div>
